<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourtCommand - Basketball Coaching Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4500;
            --primary-dark: #CC3700;
            --secondary: #1a1a1a;
            --accent: #FFB800;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-hover: #252525;
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2a2a;
            --success: #00D9A3;
            --danger: #FF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* APP CONTAINER */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
            padding: 0 2rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .nav-items {
            flex: 1;
            overflow-y: auto;
        }

        .nav-item {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--surface-hover);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 2rem;
            min-height: 100vh;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* BUTTONS */
        .btn {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.4);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #CC3333;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .modal-close:hover {
            color: var(--text);
        }

        /* FORM */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.875rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 69, 0, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        /* CALENDAR */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--surface);
            border-radius: 12px;
        }

        .calendar-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .calendar-nav button {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .calendar-nav button:hover {
            background: var(--border);
        }

        .calendar-month {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .calendar-day-header {
            background: var(--surface);
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            color: var(--accent);
        }

        .calendar-day {
            background: var(--surface);
            min-height: 120px;
            padding: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .calendar-day:hover {
            background: var(--surface-hover);
        }

        .calendar-day.other-month {
            opacity: 0.4;
        }

        .day-number {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .day-event {
            background: var(--primary);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .day-event.game {
            background: var(--accent);
            color: var(--secondary);
        }

        .day-event.meeting {
            background: var(--success);
        }

        /* ROSTER */
        .roster-table {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
        }

        .roster-row {
            display: grid;
            grid-template-columns: 80px 1fr 100px 120px 1fr 120px;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .roster-row:hover {
            background: var(--surface-hover);
        }

        .roster-row.header {
            font-weight: 600;
            color: var(--accent);
            background: var(--bg);
        }

        .roster-row.header:hover {
            background: var(--bg);
        }

        .roster-actions {
            display: flex;
            gap: 0.5rem;
        }

        .roster-actions button {
            padding: 0.25rem 0.75rem;
            font-size: 0.85rem;
        }

        /* CARDS */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .card-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .card-content {
            color: var(--text-secondary);
            margin: 1rem 0;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .card-actions button {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state-text {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        /* USER INFO */
        .user-info {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--surface);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            z-index: 200;
        }

        .user-name {
            font-weight: 600;
        }

        .user-role {
            background: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .logout-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: var(--border);
        }

        /* AUTH OVERLAY */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-overlay.hidden {
            display: none;
        }

        .auth-container {
            background: var(--surface);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 3rem;
            max-width: 450px;
            width: 90%;
        }

        .auth-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 3px;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .demo-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .demo-text {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .roster-row {
                grid-template-columns: 60px 1fr 80px;
            }

            .roster-row > :nth-child(4),
            .roster-row > :nth-child(5) {
                display: none;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Auth Overlay -->
        <div class="auth-overlay" id="authOverlay">
            <div class="auth-container">
                <div class="auth-logo">COURTCOMMAND</div>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                    <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
                </div>

                <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </form>

                <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-input" id="signupName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="signupEmail" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="signupPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                </form>

                <div class="demo-section">
                    <p class="demo-text">Just exploring?</p>
                    <button class="btn btn-secondary" style="width: 100%;" onclick="enterDemoMode()">
                        👀 Try Demo Mode
                    </button>
                </div>
            </div>
        </div>

        <!-- User Info -->
        <div class="user-info" id="userInfo" style="display: none;">
            <span class="user-name" id="userName"></span>
            <span class="user-role" id="userRole">COACH</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="logo">COURTCOMMAND</div>
            <div class="nav-items" id="navItems">
                <!-- Navigation will be built dynamically -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Calendar Section -->
            <div class="content-section active" id="calendar-section">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">CALENDAR</h1>
                        <p class="page-subtitle">Manage your season schedule</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddEventModal()">
                        + Add Event
                    </button>
                </div>

                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button onclick="changeMonth(-1)">←</button>
                        <span class="calendar-month" id="currentMonth"></span>
                        <button onclick="changeMonth(1)">→</button>
                    </div>
                    <button class="btn btn-secondary" onclick="goToToday()">Today</button>
                </div>

                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <!-- Roster Section -->
            <div class="content-section" id="roster-section">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">TEAM ROSTER</h1>
                        <p class="page-subtitle">Manage your players</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddPlayerModal()">
                        + Add Player
                    </button>
                </div>

                <div class="roster-table">
                    <div class="roster-row header">
                        <div>#</div>
                        <div>Name</div>
                        <div>Position</div>
                        <div>Grade</div>
                        <div>Contact</div>
                        <div>Actions</div>
                    </div>
                    <div id="rosterList"></div>
                </div>
            </div>

            <!-- Practice Plans Section -->
            <div class="content-section" id="practice-section">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">PRACTICE PLANS</h1>
                        <p class="page-subtitle">Build and organize practice sessions</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddPracticeModal()">
                        + New Practice Plan
                    </button>
                </div>

                <div class="cards-grid" id="practiceList"></div>
            </div>

            <!-- Drills Section -->
            <div class="content-section" id="drills-section">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">DRILL LIBRARY</h1>
                        <p class="page-subtitle">Your collection of basketball drills</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddDrillModal()">
                        + Add Drill
                    </button>
                </div>

                <div class="cards-grid" id="drillsList"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        let currentUser = null;
        let currentDate = new Date();
        let events = [];
        let roster = [];
        let practices = [];
        let drills = [];

        // Load data from localStorage
        function loadData() {
            events = JSON.parse(localStorage.getItem('events') || '[]');
            roster = JSON.parse(localStorage.getItem('roster') || '[]');
            practices = JSON.parse(localStorage.getItem('practices') || '[]');
            drills = JSON.parse(localStorage.getItem('drills') || '[]');
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('events', JSON.stringify(events));
            localStorage.setItem('roster', JSON.stringify(roster));
            localStorage.setItem('practices', JSON.stringify(practices));
            localStorage.setItem('drills', JSON.stringify(drills));
        }

        // ============================================
        // AUTHENTICATION
        // ============================================
        
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            login(email, 'User', 'coach');
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            login(email, name, 'coach');
        }

        function login(email, name, role) {
            currentUser = { email, name, role };
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userName').textContent = name;
            
            buildNavigation();
            loadData();
            renderCalendar();
            renderRoster();
            renderPractices();
            renderDrills();
        }

        function enterDemoMode() {
            login('demo@courtcommand.com', 'Demo Coach', 'coach');
            // Load sample data for demo
            events = [
                {id: '1', title: 'Practice', date: '2026-03-15', time: '6:00 PM', type: 'practice', notes: 'Defense focus'},
                {id: '2', title: 'Game vs Warriors', date: '2026-03-20', time: '7:00 PM', type: 'game', notes: 'Home game'}
            ];
            roster = [
                {id: '1', number: 23, name: 'Michael Jordan', position: 'Guard', grade: '10th', contact: 'parent@email.com'},
                {id: '2', number: 24, name: 'Kobe Bryant', position: 'Guard', grade: '11th', contact: 'parent2@email.com'}
            ];
            saveData();
            renderCalendar();
            renderRoster();
        }

        function logout() {
            currentUser = null;
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('userInfo').style.display = 'none';
        }

        // ============================================
        // NAVIGATION
        // ============================================
        
        function buildNavigation() {
            const navItems = [
                {id: 'calendar', icon: '📅', label: 'Calendar'},
                {id: 'roster', icon: '👥', label: 'Team Roster'},
                {id: 'practice', icon: '📋', label: 'Practice Plans'},
                {id: 'drills', icon: '🏀', label: 'Drill Library'}
            ];

            const nav = document.getElementById('navItems');
            nav.innerHTML = navItems.map(item => `
                <div class="nav-item ${item.id === 'calendar' ? 'active' : ''}" 
                     onclick="navigateTo('${item.id}')" data-section="${item.id}">
                    <span class="nav-icon">${item.icon}</span>
                    <span>${item.label}</span>
                </div>
            `).join('');
        }

        function navigateTo(section) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.section === section) {
                    item.classList.add('active');
                }
            });

            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${section}-section`).classList.add('active');
        }

        // ============================================
        // CALENDAR
        // ============================================
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = 
                new Date(year, month).toLocaleDateString('en-US', {month: 'long', year: 'numeric'});
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
                .map(day => `<div class="calendar-day-header">${day}</div>`)
                .join('');
            
            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                grid.innerHTML += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = events.filter(e => e.date === dateStr);
                
                grid.innerHTML += `
                    <div class="calendar-day" onclick="openAddEventModal('${dateStr}')">
                        <div class="day-number">${day}</div>
                        ${dayEvents.map(e => `
                            <div class="day-event ${e.type}" onclick="event.stopPropagation(); editEvent('${e.id}')">
                                ${e.time} ${e.title}
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            // Next month days
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            const remainingCells = totalCells - (firstDay + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                grid.innerHTML += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
            }
        }
